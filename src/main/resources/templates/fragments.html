<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="appNavbar(activePage)" class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
  <div class="container-fluid px-4 px-lg-5">
    <a class="navbar-brand fw-bold" th:href="@{/documents}"><i class="bi bi-archive-fill text-primary me-2"></i>FileCabinet</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#appNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="appNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active'" th:href="@{/documents}">
            <i class="bi bi-grid-1x2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${activePage == 'upload'} ? 'active'" th:href="@{/documents/new}">
            <i class="bi bi-cloud-upload me-1"></i>Upload Document
          </a>
        </li>
      </ul>
      <ul class="navbar-nav align-items-lg-center gap-lg-3">
        <li class="nav-item">
          <span class="badge text-bg-primary" th:text="${currentUser.role}">ADMIN</span>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#" role="button" data-bs-toggle="dropdown">
            <span class="avatar-circle d-inline-flex align-items-center justify-content-center" th:text="${#strings.substring(currentUser.username,0,1)}">J</span>
            <span th:text="${currentUser.username}">jane.doe</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><h6 class="dropdown-header" th:text="${currentUser.email}">jane.doe@company.com</h6></li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <form th:action="@{/logout}" method="post">
                <button class="dropdown-item" type="submit"><i class="bi bi-box-arrow-right me-2"></i>Sign out</button>
              </form>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<th:block th:fragment="statusBadge(status)" th:switch="${status}">
  <span th:case="'UPLOADED'" class="badge text-bg-secondary" th:text="${status}">UPLOADED</span>
  <span th:case="'STRUCTURED'" class="badge text-bg-warning" th:text="${status}">STRUCTURED</span>
  <span th:case="'APPROVED'" class="badge text-bg-success" th:text="${status}">APPROVED</span>
  <span th:case="'REJECTED'" class="badge text-bg-danger" th:text="${status}">REJECTED</span>
  <span th:case="*" class="badge text-bg-light" th:text="${status}">STATUS</span>
</th:block>

</body>
</html>
