<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2F6FEE">
  <title>My Reviews · FileCabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link th:href="@{/css/filecabinet.css}" href="../static/css/filecabinet.css" rel="stylesheet">
</head>
<body>

<nav th:replace="~{fragments :: appNavbar('inbox')}"></nav>

<div class="container py-4">

  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a th:href="@{/documents}">Dashboard</a></li>
      <li class="breadcrumb-item active">My Reviews</li>
    </ol>
  </nav>

  <h1 class="h3 mb-4">My Reviews</h1>

  <div class="card">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Document</th>
            <th>Initiated by</th>
            <th>Started</th>
            <th>Step</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="workflow : ${workflows}">
            <td th:text="${workflow.document.title}">Q3 Vendor Invoice — Acme Corp</td>
            <td th:text="${workflow.initiator.username}">jane.doe</td>
            <td th:text="${#temporals.format(workflow.createdOn, 'MMM d, yyyy')}">Jun 2, 2026</td>
            <td>Awaiting your review</td>
            <td class="text-end">
              <a class="btn btn-primary btn-sm" th:href="@{/workflows/{id}(id=${workflow.id})}">Review</a>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(workflows)}">
            <td colspan="5" class="text-muted text-center py-4">Nothing waiting on you right now.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
