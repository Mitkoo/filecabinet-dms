<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2F6FEE">
  <title>Forgot password · FileCabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link th:href="@{/css/filecabinet.css}" href="../static/css/filecabinet.css" rel="stylesheet">
</head>
<body>

<nav class="navbar bg-white border-bottom">
  <div class="container-fluid px-4 px-lg-5 d-flex align-items-center">
    <a class="navbar-brand fw-bold mb-0" th:href="@{/}"><i class="bi bi-archive-fill text-primary me-2"></i>FileCabinet</a>
    <span class="ms-auto text-muted small">Remembered it? <a th:href="@{/login}">Sign in</a></span>
  </div>
</nav>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="card shadow-sm mt-5">
        <div class="card-body p-4">
          <h1 class="h3 mb-1">Reset your password</h1>
          <p class="text-muted mb-4">Enter your username and the email on your account, then choose a new password.</p>

          <div class="alert alert-danger py-2" th:if="${errorMessage}" th:text="${errorMessage}">
            No account matches that username and email.
          </div>

          <form th:action="@{/forgot-password}" th:object="${forgotPasswordForm}" method="post" novalidate>
            <div class="mb-3">
              <label class="form-label" for="username">Username</label>
              <input type="text" class="form-control" id="username" th:field="*{username}"
                     th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'" placeholder="jane.doe" autocomplete="username">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">
                Username is required.
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label" for="email">Email address</label>
              <input type="email" class="form-control" id="email" th:field="*{email}"
                     th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="jane.doe@company.com" autocomplete="email">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                Enter a valid email address.
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label" for="newPassword">New password</label>
              <input type="password" class="form-control" id="newPassword" th:field="*{newPassword}"
                     th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'" placeholder="At least 8 characters" autocomplete="new-password">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}">
                Password must be at least 8 characters.
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label" for="confirmPassword">Confirm new password</label>
              <input type="password" class="form-control" id="confirmPassword" th:field="*{confirmPassword}"
                     th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'" placeholder="Re-enter your new password" autocomplete="new-password">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">
                Passwords must match.
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-lg">Reset password</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
