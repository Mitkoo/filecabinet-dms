<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2F6FEE">
  <title>Manage Users · FileCabinet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link th:href="@{/css/filecabinet.css}" href="../static/css/filecabinet.css" rel="stylesheet">
</head>
<body>

<nav th:replace="~{fragments :: appNavbar('users')}"></nav>

<div class="container py-4">

  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a th:href="@{/documents}">Dashboard</a></li>
      <li class="breadcrumb-item active">Manage Users</li>
    </ol>
  </nav>

  <h1 class="h3 mb-4">Manage Users</h1>

  <div class="alert alert-success d-flex align-items-center gap-2" th:if="${successMessage}" th:text="${successMessage}">
    <i class="bi bi-check-circle"></i>Role updated.
  </div>
  <div class="alert alert-danger d-flex align-items-center gap-2" th:if="${errorMessage}" th:text="${errorMessage}">
    <i class="bi bi-exclamation-triangle"></i>Something went wrong.
  </div>

  <div class="card">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>User</th>
            <th>Email</th>
            <th>Role</th>
            <th class="text-end">Change role</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="user : ${users}">
            <td>
              <span class="avatar-circle d-inline-flex align-items-center justify-content-center me-2" th:text="${#strings.substring(user.username,0,1)}">j</span>
              <span class="fw-semibold" th:text="${user.username}">jane.doe</span>
            </td>
            <td th:text="${user.email}">jane.doe@company.com</td>
            <td><span class="badge text-bg-primary" th:text="${user.role}">CLERK</span></td>
            <td class="text-end">
              <form th:action="@{/users/{id}/role(id=${user.id})}" method="post" class="d-flex justify-content-end gap-2"
                    th:if="${user.id != currentUser.id}">
                <select class="form-select form-select-sm" name="role" style="width:auto;">
                  <option th:each="role : ${roles}" th:value="${role}" th:text="${role}" th:selected="${role == user.role}">CLERK</option>
                </select>
                <button type="submit" class="btn btn-outline-primary btn-sm">Update</button>
              </form>
              <span class="text-muted small" th:if="${user.id == currentUser.id}">This is you</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
